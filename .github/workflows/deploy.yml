name: Deploy to ECS Fargate

on:
  push:
    branches: [main]

env:
  AWS_REGION: ca-central-1
  ECR_REGISTRY: 435472314090.dkr.ecr.ca-central-1.amazonaws.com
  BACKEND_IMAGE_NAME: space-visualiser-api
  FRONTEND_IMAGE_NAME: space-visualiser-frontend
  ECS_CLUSTER: space-visualiser-cluster
  ECS_SERVICE: space-visualiser-service-zwb2r93g
  ECS_TASK_FAMILY: space-visualiser

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  deploy:
    name: Build, Push, Deploy
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$BACKEND_IMAGE_NAME:${{ github.sha }} \
            -t $ECR_REGISTRY/$BACKEND_IMAGE_NAME:latest \
            -f backend/visualiser-api/Dockerfile ./backend/visualiser-api
          docker push $ECR_REGISTRY/$BACKEND_IMAGE_NAME:${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_IMAGE_NAME:latest

      - name: Build and push frontend
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$FRONTEND_IMAGE_NAME:${{ github.sha }} \
            -t $ECR_REGISTRY/$FRONTEND_IMAGE_NAME:latest \
            -f frontend/Dockerfile ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE_NAME:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE_NAME:latest

      - name: Download and Clean Task Definition
        run: |
          aws ecs describe-task-definition --task-definition $ECS_TASK_FAMILY \
            --query 'taskDefinition' --region $AWS_REGION > temp-td.json
          # Strips metadata that causes 'InvalidParameterException' when registering new versions
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' temp-td.json > task-definition.json

      - name: Inject API secrets into task definition
        run: |
          jq --arg nasa "${{ secrets.NASA_API_KEY }}" \
             --arg gemini "${{ secrets.GEMINI_API_KEY }}" \
             '(.containerDefinitions[] | select(.name == "backend") | .secrets) |=
               map(select(.name != "NASA_API_KEY" and .name != "GEMINI_API_KEY"))
             | (.containerDefinitions[] | select(.name == "backend") | .environment) += [
                 {"name": "NASA_API_KEY", "value": $nasa},
                 {"name": "GEMINI_API_KEY", "value": $gemini}
               ]
             | (.containerDefinitions[] | select(.name == "backend") | .healthCheck.command) =
               ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health/liveness || exit 1"]' \
             task-definition.json > task-definition-patched.json
          mv task-definition-patched.json task-definition.json

      - name: Update backend image in task definition
        id: update-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Update frontend image in task definition
        id: update-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.update-backend.outputs.task-definition }}
          container-name: frontend
          image: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.update-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10
          force-new-deployment: true