name: PR Quality Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  # ==========================================
  # JOB 1: Backend Verification
  # ==========================================
  backend-verify:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: spacedb_test
          POSTGRES_USER: space
          POSTGRES_PASSWORD: space123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Run Checkstyle
        working-directory: backend/visualiser-api
        run: mvn checkstyle:check

      - name: Run backend tests
        working-directory: backend/visualiser-api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/spacedb_test
          SPRING_DATASOURCE_USERNAME: space
          SPRING_DATASOURCE_PASSWORD: space123
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
        run: mvn clean test

  # ==========================================
  # JOB 2: Frontend Verification
  # ==========================================
  frontend-verify:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint & Test
        working-directory: frontend
        run: |
          npm run lint || echo "No lint script found, skipping..."
          npm test -- --run

      - name: Verify Build
        working-directory: frontend
        run: npm run build

  # ==========================================
  # JOB 3: Security Scan (Optional but Recommended)
  # ==========================================
  security-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Backend Dependency Check
        working-directory: backend/visualiser-api
        run: mvn dependency-check:check || echo "Plugin not configured, skipping..."
        continue-on-error: true