name: CI Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests-lint:
    name: Backend Tests & Checkstyle Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run JUnit tests
        run: mvn -B clean test
        working-directory: backend/visualiser-api

      - name: Run Checkstyle lint check
        run: mvn -B checkstyle:check
        working-directory: backend/visualiser-api

      - name: Build project
        run: mvn -B clean install -DskipTests
        working-directory: backend/visualiser-api

  frontend-tests-build:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    # Only run this job if frontend directory exists
    if: hashFiles('frontend/package.json') != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

      - name: Build project
        run: npm run build
        working-directory: frontend
