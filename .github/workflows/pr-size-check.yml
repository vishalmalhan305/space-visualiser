name: PR Size Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  size-check:
    name: Check PR Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;
            
            console.log(`PR changes: +${additions} -${deletions} (total: ${total})`);
            
            if (total > 1000) {
              core.warning('⚠️ Large PR detected (>1000 lines). Consider splitting into smaller PRs.');
            } else if (total > 500) {
              core.notice('📝 Medium-sized PR (>500 lines). Review carefully.');
            } else {
              core.notice('✅ Small PR. Easy to review!');
            }