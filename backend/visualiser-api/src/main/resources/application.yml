spring:
  application:
    name: space-visualiser-api
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/spacedb
    username: ${POSTGRES_USER:space}
    password: ${POSTGRES_PASSWORD:space123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  nasa:
    base-url: https://api.nasa.gov
    api-key: ${NASA_API_KEY:}
  iss:
    base-url: https://api.wheretheiss.at/v1
  gemini:
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    explanation-cache-ttl: PT24H
  exoplanets:
    tap-url: https://exoplanetarchive.ipac.caltech.edu/TAP/sync
    cache-ttl: PT12H

# Actuator configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus