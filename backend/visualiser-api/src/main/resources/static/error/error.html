<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --border: #dbe2f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at top, #e7eefc, var(--bg));
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 640px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.8rem;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: var(--muted);
        }

        .actions {
            margin-top: 22px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            background: #fff;
            font-size: 0.95rem;
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>
<main class="card" role="main">
    <h1>Something went wrong</h1>
    <p>
        The request could not be completed. Try again in a moment, or go back to the API root.
    </p>
    <div class="actions">
        <a class="btn primary" href="/">Go Home</a>
        <a class="btn" href="/actuator/health">Check Health</a>
    </div>
</main>
</body>
</html>
