# Copy this file to application.yml for local development and fill in real secrets.
spring:
  application:
    name: space-visualiser-api
  datasource:
    url: jdbc:postgresql://localhost:5433/spacedb
    username: space
    password: space123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  nasa:
    base-url: https://api.nasa.gov
    api-key: your-nasa-api-key-here
  apod:
    cache-ttl: PT24H
  asteroids:
    cache-ttl: PT6H
  weather:
    cache-ttl: PT6H
